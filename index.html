        .header {
            padding:15px 25px; background:#16213e;

            border-bottom:2px solid #e94560;
        }
        
        .header-left h1 {
            font-size:1.3rem;
            background: linear-gradient(135deg,#e94560,#ff6b35,#ffcc02);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-left p { font-size:0.78rem; color:#888; margin-top:2px; }
        
        .status-badge {
            padding:6px 15px; border-radius:20px; font-size:0.8rem;
            background:rgba(78,204,163,0.15); border:1px solid #4ecca3; color:#4ecca3;
        }
        
        .chat-container { 
            flex:1; overflow-y:auto; padding:20px; scroll-behavior:smooth;
        }
        
        .welcome {
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            height:100%; text-align:center;
        }
        
        .welcome-emoji { font-size:4rem; margin-bottom:20px; animation:float 3s infinite; }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-10px); } }
        
        .welcome h2 { font-size:2rem; margin-bottom:10px; color:#e94560; }
        .welcome p { color:#888; max-width:500px; margin-bottom:30px; }
        
        .suggestions {
            display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
            max-width:600px; width:100%;
        }
        
        .suggestion-card {
            padding:15px; background:#16213e; border:1px solid #0f3460;
            border-radius:12px; cursor:pointer; transition:all 0.3s; text-align:left;
        }
        
        .suggestion-card:hover {
            border-color:#e94560; transform:translateY(-3px);
            box-shadow:0 5px 20px rgba(233,69,96,0.2);
        }
        
        .suggestion-card h3 { color:#e94560; font-size:0.9rem; margin-bottom:5px; }
        .suggestion-card p { color:#888; font-size:0.8rem; margin:0; }
        
        .message { 
            display:flex; gap:12px; margin-bottom:20px; animation:fadeIn 0.4s ease;
        }
        
        @keyframes fadeIn { 
            from { opacity:0; transform:translateY(10px); } 
            to { opacity:1; transform:translateY(0); }
        }
        
        .message.user { flex-direction:row-reverse; }
        
        .avatar {
            width:40px; height:40px; border-radius:50%;
            display:flex; align-items:center; justify-content:center;
            font-size:1.2rem; flex-shrink:0;
        }
        
        .message.bot .avatar { 
            background:linear-gradient(135deg,#e94560,#0f3460);
            border:2px solid #e94560;
        }
        
        .message.user .avatar { 
            background:linear-gradient(135deg,#4ecca3,#0f3460);
            border:2px solid #4ecca3;
        }
        
        .msg-wrapper { max-width:75%; }
        
        .message-content {
            padding:13px 17px; border-radius:18px; font-size:0.95rem;
            line-height:1.7; word-wrap:break-word; white-space:pre-wrap;
        }
        
        .message.bot .message-content { 
            background:#16213e; border:1px solid rgba(233,69,96,0.2);
            border-bottom-left-radius:4px;
        }
        
        .message.user .message-content { 
            background:#0f3460; border:1px solid rgba(78,204,163,0.2);
            border-bottom-right-radius:4px;
        }
        
        .message-time { font-size:0.7rem; color:#555; margin-top:4px; }
        
        .typing {
            display:none; padding:5px 20px 10px;
        }
        
        .typing-inner { display:flex; align-items:center; gap:12px; }
        
        .typing-avatar {
            width:40px; height:40px; border-radius:50%;
            background:linear-gradient(135deg,#e94560,#0f3460);
            border:2px solid #e94560; display:flex;
            align-items:center; justify-content:center; font-size:1.2rem;
        }
        
        .typing-bubble {
            background:#16213e; border:1px solid rgba(233,69,96,0.2);
            padding:13px 18px; border-radius:18px; border-bottom-left-radius:4px;
            display:flex; gap:5px;
        }
        
        .typing-bubble span {
            width:8px; height:8px; background:#e94560; border-radius:50%;
            animation:bounce 1.2s infinite;
        }
        
        .typing-bubble span:nth-child(2) { animation-delay:0.2s; }
        .typing-bubble span:nth-child(3) { animation-delay:0.4s; }
        
        @keyframes bounce { 
            0%,60%,100% { transform:translateY(0); }
            30% { transform:translateY(-8px); }
        }

            padding:15px 20px; background:#16213e;
            border-top:2px solid rgba(233,69,96,0.3);
        }
        
        .input-wrapper {
            display:flex; gap:10px; max-width:900px;
            margin:0 auto; align-items:flex-end;
        }

            flex:1; padding:13px 18px; background:#1a1a2e;
            color:#fff; border:2px solid #0f3460; border-radius:14px;
            font-size:1rem; resize:none; outline:none; max-height:120px;

    </style>

let isLoading = false;

const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const typingIndicator = document.getElementById('typingIndicator');
const welcomeScreen = document.getElementById('welcomeScreen');

sendBtn.addEventListener('click', sendMessage);

userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

userInput.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.addEventListener('click', e => {
    const card = e.target.closest('.suggestion-card');
    if (card) {
        userInput.value = card.getAttribute('data-text');
        sendMessage();
    }
});

function getResponse(message) {
    const msg = message.toLowerCase().trim();

    // Check exact matches
    for (let key in bhojpuriResponses) {
        if (key !== 'default' && msg.includes(key)) {
            const responses = bhojpuriResponses[key];
            return responses[Math.floor(Math.random() * responses.length)];
        }
    }

    // Check partial matches
    for (let key in bhojpuriResponses) {
        if (key !== 'default') {
            const words = key.split(' ');
            for (let word of words) {
                if (msg.includes(word) && word.length > 3) {
                    const responses = bhojpuriResponses[key];
                    return responses[Math.floor(Math.random() * responses.length)];
                }
            }
        }
    }

    // Return default response
    const defaults = bhojpuriResponses['default'];
    return defaults[Math.floor(Math.random() * defaults.length)];
}

async function sendMessage() {
    const message = userInput.value.trim();
    if (!message || isLoading) return;

    welcomeScreen.style.display = 'none';
    addMessage(message, 'user');

    userInput.value = '';
    userInput.style.height = 'auto';
    isLoading = true;
    sendBtn.disabled = true;
    typingIndicator.style.display = 'block';
    scrollToBottom();

    // Simulate typing delay
    setTimeout(() => {
        const response = getResponse(message);
        typingIndicator.style.display = 'none';
        addMessage(response, 'bot');
        isLoading = false;
        sendBtn.disabled = false;
        scrollToBottom();
    }, 1000 + Math.random() * 1000);
}

function addMessage(text, type) {
    const div = document.createElement('div');
    div.className = `message ${type}`;
    const time = new Date().toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `
        <div class="avatar">${type === 'bot' ? '🤖' : '👤'}</div>
        <div class="msg-wrapper">
            <div class="message-content">${text}</div>
            <div class="message-time">${time}</div>
        </div>
    `;
    chatContainer.appendChild(div);
    scrollToBottom();
}

function scrollToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
}
</script>
</body>
</html>
